name: Daily React Component

# Schedule workflow to run daily at midnight UTC
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:  # Allows manual runs

jobs:
  create-daily-component:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt into Node 24

    steps:
      # Step 1: Checkout the repo
      - uses: actions/checkout@v3

      # Step 2: Create a new React component file
      - name: Create Daily React Component
        run: |
          mkdir -p components
          FILENAME="components/Component_$(date +%Y%m%d).jsx"
          echo "import React from 'react';\n\nexport default function Component$(date +%Y%m%d)() {\n  return (\n    <div>\n      Hello React - $(date)\n    </div>\n  );\n}" > $FILENAME
          git add $FILENAME
          echo "Daily React component created on $(date)" >> README.md
          git add README.md

      # Step 3: Commit and push changes using GitHub token
      - name: Commit and Push Changes
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git commit -m "Daily React component $(date)" || echo "No changes to commit"
          git push origin HEAD:main
